<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SAFEALL - Giỏ hàng</title>
    <!-- Tailwind and Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ea2a33",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211111",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <!-- Navbar (Simplified) -->
    <header
        class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-8">
                    <a href="index.html" class="flex items-center gap-2">
                        <span class="text-primary text-2xl font-black tracking-tighter">SAFEALL</span>
                    </a>
                    <nav class="hidden md:flex items-center gap-6">
                        <a class="text-sm font-semibold hover:text-primary transition-colors" href="index.html">Trang
                            chủ</a>
                        <a class="text-sm font-semibold hover:text-primary transition-colors" href="products.html">Sản
                            phẩm</a>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <div id="authSection" class="auth-section"></div>
                    <button
                        class="relative p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span
                            class="cart-badge absolute top-0 right-0 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white hidden">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Breadcrumbs -->
        <nav class="flex items-center gap-2 text-sm mb-8 text-slate-500">
            <a class="hover:text-primary transition-colors" href="index.html">Trang chủ</a>
            <span class="material-symbols-outlined text-xs">chevron_right</span>
            <span class="text-slate-900 dark:text-slate-100 font-medium">Giỏ hàng</span>
        </nav>

        <h2 class="text-3xl font-black mb-8">Giỏ hàng của bạn</h2>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Cart Items Section -->
            <div class="lg:col-span-8">
                <div
                    class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
                    <div id="cartItemsContainer" class="p-6 space-y-8">
                        <!-- Items rendered via js/cart.js -->
                        <div class="p-8 text-center text-slate-500">Đang tải giỏ hàng...</div>
                    </div>
                </div>
                <div class="mt-6">
                    <a class="flex items-center gap-2 text-sm font-bold text-slate-700 dark:text-slate-300 hover:text-primary transition-colors"
                        href="products.html">
                        <span class="material-symbols-outlined text-base">arrow_back</span>
                        Tiếp tục mua sắm
                    </a>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="lg:col-span-4">
                <div
                    class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm sticky top-24">
                    <h3 class="text-lg font-bold mb-6">Tóm tắt đơn hàng</h3>
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">Tạm tính <span class="cart-total-count text-xs"></span></span>
                            <span class="font-medium text-slate-900 dark:text-slate-100 cart-total-price">0đ</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">Phí vận chuyển</span>
                            <span class="text-xs text-slate-400 italic">Tính khi thanh toán</span>
                        </div>
                    </div>
                    <div class="pt-6 border-t border-slate-200 dark:border-slate-700 mb-8">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-base font-bold">Tổng cộng</span>
                            <div class="text-right">
                                <p class="text-2xl font-black text-primary cart-order-total">0đ</p>
                                <p class="text-[10px] text-slate-400 uppercase tracking-widest">(Đã bao gồm VAT)</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <button
                            class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                            onclick="window.location.href='checkout.html'">
                            TIẾN HÀNH THANH TOÁN
                            <span
                                class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 border-t border-slate-200 dark:border-slate-800 py-10 bg-white dark:bg-slate-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-slate-400 text-xs font-medium">
                    © 2026 SAFEALL Emergency Solutions. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/lang.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
