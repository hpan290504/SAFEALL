<!DOCTYPE html>

<html class="dark" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SAFEALL - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d0021b",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .bg-pattern {
            background-color: #101022;
            background-image: radial-gradient(circle at 2px 2px, #d0021b33 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glass-effect {
            backdrop-filter: blur(12px);
            background-color: rgba(16, 16, 34, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-pattern px-4">
        <!-- Background Accents -->
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
        <!-- Main Content Container -->
        <div class="w-full max-w-[480px] z-10">
            <!-- Logo Area -->
            <div class="flex flex-col items-center mb-10">
                <a href="index.html" class="flex items-center gap-3 text-white mb-2" style="text-decoration:none">
                    <div
                        class="size-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/40">
                        <svg class="size-6 text-white" fill="none" viewBox="0 0 48 48"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M24 6L40 14V26C40 35.389 32.837 43.548 24 46C15.163 43.548 8 35.389 8 26V14L24 6Z"
                                fill="currentColor" opacity="0.9" />
                            <path d="M17 25l5 5 9-9" stroke="white" stroke-width="3" stroke-linecap="round"
                                stroke-linejoin="round" fill="none" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight">SAFEALL</h1>
                </a>
                <p class="text-slate-400 font-medium">Chuẩn bị khẩn cấp — An toàn mọi lúc</p>
            </div>
            <!-- Login Card -->
            <div class="glass-effect rounded-2xl p-8 md:p-10 shadow-2xl border border-white/5">
                <div class="flex border-b border-slate-800 mb-8">
                    <button class="flex-1 pb-4 text-sm font-bold border-b-2 border-primary text-white">Đăng
                        nhập</button>
                    <a href="sign_up/sign_up.html"
                        class="flex-1 pb-4 text-sm font-bold text-slate-500 hover:text-slate-300 text-center transition-colors">Đăng
                        ký</a>
                </div>
                <div class="mb-6">
                    <h2 class="text-2xl font-bold mb-2">Chào mừng trở lại</h2>
                    <p class="text-slate-400 text-sm">Nhập thông tin đăng nhập để tiếp tục vào tài khoản.</p>
                </div>

                <!-- Error message -->
                <div id="loginError"
                    class="hidden mb-5 px-4 py-3 rounded-xl bg-primary/10 border border-primary/30 text-red-400 text-sm font-medium">
                </div>

                <form id="unifiedLoginForm" class="space-y-6">
                    <!-- Username Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1" for="loginUsername">Số điện thoại (10
                            số)</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">person</span>
                            </div>
                            <input id="loginUsername"
                                class="block w-full pl-11 pr-4 py-3.5 bg-background-dark/50 border border-slate-700/50 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="0xxxxxxxxx (10 số)" type="tel" maxlength="10" required
                                autocomplete="tel" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-sm font-semibold text-slate-300" for="loginPassword">Mật khẩu</label>
                            <a class="text-xs font-bold text-primary hover:text-primary/80 transition-colors"
                                href="#">Quên mật khẩu?</a>
                        </div>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">lock</span>
                            </div>
                            <input id="loginPassword"
                                class="block w-full pl-11 pr-12 py-3.5 bg-background-dark/50 border border-slate-700/50 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="••••••••" type="password" autocomplete="current-password" />
                            <button id="togglePassword"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-slate-300 transition-colors"
                                type="button">
                                <span class="material-symbols-outlined text-xl">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Remember Me -->
                    <div class="flex items-center gap-2 px-1">
                        <input
                            class="w-4 h-4 rounded border-slate-700 bg-background-dark text-primary focus:ring-primary focus:ring-offset-background-dark"
                            id="remember" type="checkbox" />
                        <label class="text-sm text-slate-400 select-none" for="remember">Ghi nhớ đăng nhập</label>
                    </div>
                    <!-- Login Button -->
                    <button
                        class="w-full flex items-center justify-center gap-2 py-4 px-6 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98]"
                        type="submit">
                        <span>Đăng nhập</span>
                        <span class="material-symbols-outlined">arrow_forward</span>
                    </button>
                </form>
                <!-- Social Login Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <span class="w-full border-t border-slate-800"></span>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-[#1a1a2e] px-2 text-slate-500">Hoặc tiếp tục với</span>
                    </div>
                </div>
                <!-- Social Buttons -->
                <div class="grid grid-cols-2 gap-4">
                    <button
                        class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-800 transition-colors text-sm font-medium"
                        type="button">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
                            width="20" height="20" alt="Facebook" />
                        Facebook
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-800 transition-colors text-sm font-medium"
                        type="button">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05"></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335"></path>
                        </svg>
                        Google
                    </button>
                </div>
            </div>
            <!-- Footer Action -->
            <p class="mt-8 text-center text-slate-400">
                Bạn mới biết đến SAFEALL?
                <a class="text-primary font-bold hover:underline transition-all" href="sign_up/sign_up.html">Đăng ký
                    miễn phí</a>
            </p>
            <!-- Secondary Navigation -->
            <div class="mt-12 flex justify-center gap-6 text-xs text-slate-600 font-medium">
                <a class="hover:text-slate-400 transition-colors" href="#">Chính sách bảo mật</a>
                <a class="hover:text-slate-400 transition-colors" href="#">Điều khoản dịch vụ</a>
                <a class="hover:text-slate-400 transition-colors" href="#">Trợ giúp</a>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwInput = document.getElementById('loginPassword');
            const icon = this.querySelector('.material-symbols-outlined');
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwInput.type = 'password';
                icon.textContent = 'visibility';
            }
        });
    </script>
    <script src="js/login.js"></script>
</body>

</html>
