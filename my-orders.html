<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Theo dõi đơn hàng | SAFEALL</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/icons.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ea2a33",
                        "secondary": "#1e3a8a",
                        "background-light": "#f8f6f6",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .tab-active {
            border-color: #ea2a33;
            color: #ea2a33;
            font-weight: 900;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-slate-950 font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <header
        class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center">
                <span class="text-2xl font-black tracking-tighter"><span class="text-secondary">SAFE</span><span
                        class="text-primary">ALL</span></span>
            </a>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-sm font-semibold hover:text-primary transition-colors" href="index.html">Trang chủ</a>
                <a class="text-sm font-semibold hover:text-primary transition-colors" href="products.html">Sản phẩm</a>
                <a class="text-sm font-semibold hover:text-primary transition-colors text-primary"
                    href="my-orders.html">Theo dõi đơn</a>
            </nav>
            <a href="products.html"
                class="hidden sm:block bg-primary text-white px-6 py-2.5 rounded-full font-bold text-sm hover:opacity-90 transition-all shadow-lg shadow-primary/20">
                MUA NGAY
            </a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-black mb-4 uppercase tracking-tight">Theo dõi đơn hàng</h1>
            <p class="text-slate-500">Nhập mã đơn hàng để kiểm tra trạng thái vận chuyển thời gian thực</p>
        </div>

        <!-- Secured Search Bar -->
        <div
            class="max-w-xl mx-auto mb-16 bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
            <div class="space-y-4">
                <div class="relative group">
                    <i
                        class="codicon codicon-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                    <input id="orderSearchInput" type="text" placeholder="Nhập mã đơn hàng hoặc Số điện thoại"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 transition-all font-bold" />
                </div>
                <div class="relative group">
                    <i
                        class="codicon codicon-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                    <input id="orderSearchPin" type="password" inputmode="numeric" maxlength="6"
                        placeholder="Nhập mã PIN tra cứu (6 số)"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 transition-all tracking-[0.3em] font-bold" />
                </div>
                <button onclick="searchOrder()"
                    class="w-full bg-primary text-white px-6 py-4 rounded-xl font-black hover:opacity-90 transition-all flex items-center justify-center gap-2">
                    <i class="codicon codicon-shield text-lg"></i>
                    TRA CỨU BẢO MẬT
                </button>
            </div>
        </div>

        <!-- Order List / Results Container -->
        <div id="ordersContainer" class="space-y-8">
            <!-- Dynamic Content -->
            <div id="loadingState" class="hidden py-20 text-center text-slate-400">
                <i class="codicon codicon-sync animate-spin text-4xl mb-4"></i>
                <p class="font-bold uppercase tracking-widest text-xs">Đang tìm kiếm đơn hàng...</p>
            </div>

            <div id="emptyState"
                class="py-20 text-center bg-white dark:bg-slate-900 rounded-3xl border border-dashed border-slate-200 dark:border-slate-800">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="currentColor"
                    class="mb-4 opacity-20">
                    <path
                        d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-1.45-5c.75 0 1.41-.41 1.75-1.03L21 4H5.21l-.94-2H1v2h2l3.6 7.59L5.25 14c-.16.28-.25.61-.25.96C5 16.1 5.9 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H16z" />
                </svg>
                <h3 class="font-bold text-slate-500">Vui lòng nhập mã đơn hàng của bạn</h3>
                <p class="text-slate-400 text-sm mt-1">Lịch sử mua hàng sẽ hiển thị tại đây</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center text-slate-400 text-xs">
        © 2026 SAFEALL Vietnam. Tái cấu trúc chuẩn bị khẩn cấp.
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const statusMap = {
            'pending': { text: 'Chờ thanh toán', color: '#f59e0b', step: 1 },
            'processing': { text: 'Đang xử lý', color: '#3b82f6', step: 2 },
            'shipping': { text: 'Đang vận chuyển', color: '#8b5cf6', step: 3 },
            'completed': { text: 'Hoàn thành', color: '#10b981', step: 4 }
        };

        async function searchOrder() {
            const input = document.getElementById('orderSearchInput').value.trim().replace('#', '');
            const pin = document.getElementById('orderSearchPin').value.trim();

            if (!input) {
                alert('Vui lòng nhập Mã đơn hàng hoặc Số điện thoại để tra cứu.');
                return;
            }
            if (!pin || pin.length !== 6) {
                alert('Vui lòng nhập mã PIN hợp lệ (6 số) để xác minh bảo mật.');
                return;
            }

            const container = document.getElementById('ordersContainer');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.remove('hidden');
            empty.classList.add('hidden');

            // Call the unified guest-tracking endpoint securely with PIN
            const res = await window.SAFEALL_API.trackOrder(input, pin);

            loading.classList.add('hidden');

            if (res.success && res.orders && res.orders.length > 0) {
                renderOrder(res.orders[0]); // Render the first/most recent match
            } else {
                container.innerHTML = `
                     <div class="py-20 text-center bg-white dark:bg-slate-900 rounded-3xl border border-red-100 dark:border-red-900/20 shadow-xl shadow-red-500/5">
                        <i class="codicon codicon-search-stop text-6xl text-primary/20 mb-4"></i>
                        <h3 class="font-black text-slate-900 dark:text-white text-xl">Tra cứu thất bại</h3>
                        <p class="text-slate-500 text-sm mt-2 max-w-xs mx-auto">${res.message || 'Mã PIN hoặc thông tin tra cứu không chính xác. Vui lòng kiểm tra lại.'}</p>
                    </div>
                `;
            }
        }

        function renderOrder(order) {
            const container = document.getElementById('ordersContainer');
            const status = statusMap[order.status] || { text: 'Đang xử lý', color: '#3b82f6', step: 2 };

            container.innerHTML = `
                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800 overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="p-8 md:p-12 space-y-12">
                        <!-- Header & Status -->
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <span class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Trạng thái đơn hàng</span>
                                <h2 class="text-2xl font-black text-slate-900 dark:text-white uppercase tracking-tight">#${order.id.toUpperCase()}</h2>
                            </div>
                            <div class="px-6 py-2 rounded-full bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700">
                                <span class="text-xs font-black uppercase tracking-widest" style="color: ${status.color}">${status.text}</span>
                            </div>
                        </div>

                        <!-- Tracking Timeline -->
                        <div class="relative pb-10">
                            <div class="absolute left-0 top-6 w-full h-1 bg-slate-100 dark:bg-slate-800 -z-10"></div>
                            <div class="grid grid-cols-4 gap-2">
                                ${['Xác nhận', 'Xử lý', 'Giao hàng', 'Hoàn tất'].map((label, idx) => {
                const active = (idx + 1) <= status.step;
                return `
                                        <div class="flex flex-col items-center gap-4 text-center">
                                            <div class="size-12 rounded-full flex items-center justify-center transition-all duration-500 ${active ? 'bg-primary text-white shadow-lg shadow-primary/30 scale-110' : 'bg-white dark:bg-slate-900 text-slate-300 border-4 border-slate-100 dark:border-slate-800'}">
                                                <i class="codicon ${['codicon-check', 'codicon-package', 'codicon-arrow-right', 'codicon-pass-filled'][idx]} text-lg"></i>
                                            </div>
                                            <span class="text-[10px] font-black uppercase tracking-widest ${active ? 'text-primary' : 'text-slate-400'}">${label}</span>
                                        </div>
                                    `;
            }).join('')}
                            </div>
                        </div>

                        <!-- Details Grid -->
                        <div class="grid md:grid-cols-2 gap-12 pt-12 border-t border-slate-50 dark:border-slate-800">
                            <div class="space-y-6">
                                <h4 class="text-xs font-black uppercase tracking-widest text-slate-400">Người nhận</h4>
                                <div class="space-y-1">
                                    <p class="font-black text-lg">${order.customer.name}</p>
                                    <p class="text-slate-500 text-sm">${order.customer.phone}</p>
                                    <p class="text-slate-500 text-sm leading-relaxed">${order.customer.address}</p>
                                </div>
                            </div>
                            <div class="space-y-6">
                                <h4 class="text-xs font-black uppercase tracking-widest text-slate-400">Vật dụng đặt mua</h4>
                                <div class="space-y-4">
                                    ${order.items.map(item => `
                                        <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl">
                                            <span class="text-sm font-bold text-slate-700 dark:text-slate-300">${item.qty}x ${item.title}</span>
                                            <span class="font-black text-slate-900 dark:text-white">${item.price.toLocaleString('vi-VN')}đ</span>
                                        </div>
                                    `).join('')}
                                    <div class="flex justify-between items-center pt-4 border-t border-slate-200 dark:border-slate-700">
                                        <span class="font-black uppercase text-xs tracking-widest">Tổng cộng</span>
                                        <span class="text-2xl font-black text-primary">${order.total.toLocaleString('vi-VN')}đ</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Check for order in URL if navigating from success page
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            if (orderId) {
                // Pre-fill ID but require user to manually enter PIN for security
                document.getElementById('orderSearchInput').value = orderId;
                document.getElementById('orderSearchPin').focus();
            }
        });
    </script>
</body>

</html>
