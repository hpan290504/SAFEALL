<!DOCTYPE html>
<html class="dark" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SAFEALL - Đăng ký tài khoản</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d0021b",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .bg-pattern {
            background-color: #101022;
            background-image: radial-gradient(circle at 2px 2px, #d0021b33 1px, transparent 0);
            background-size: 40px 40px;
        }

        .glass-effect {
            backdrop-filter: blur(12px);
            background-color: rgba(16, 16, 34, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-pattern px-4 py-12">
        <!-- Background Accents -->
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>

        <!-- Main Content Container -->
        <div class="w-full max-w-[520px] z-10">
            <!-- Logo Area -->
            <div class="flex flex-col items-center mb-8">
                <a href="../index.html" class="flex items-center gap-3 text-white mb-2" style="text-decoration:none">
                    <div
                        class="size-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/40">
                        <svg class="size-6 text-white" fill="none" viewBox="0 0 48 48"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M24 6L40 14V26C40 35.389 32.837 43.548 24 46C15.163 43.548 8 35.389 8 26V14L24 6Z"
                                fill="currentColor" opacity="0.9" />
                            <path d="M17 25l5 5 9-9" stroke="white" stroke-width="3" stroke-linecap="round"
                                stroke-linejoin="round" fill="none" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight">SAFEALL</h1>
                </a>
                <p class="text-slate-400 font-medium">Tạo tài khoản bảo mật của bạn</p>
            </div>

            <!-- Sign Up Card -->
            <div class="glass-effect rounded-2xl p-8 md:p-10 shadow-2xl border border-white/5">
                <div class="flex border-b border-slate-800 mb-8">
                    <a href="../login.html"
                        class="flex-1 pb-4 text-sm font-bold text-slate-500 hover:text-slate-300 text-center transition-colors">Đăng
                        nhập</a>
                    <button class="flex-1 pb-4 text-sm font-bold border-b-2 border-primary text-white">Đăng ký</button>
                </div>
                <div class="mb-6">
                    <h2 class="text-2xl font-bold mb-2">Đăng ký thành viên</h2>
                    <p class="text-slate-400 text-sm">Điền đầy đủ các thông tin bên dưới để tham gia SAFEALL.</p>
                </div>

                <!-- Error message -->
                <div id="signupError"
                    class="hidden mb-5 px-4 py-3 rounded-xl bg-primary/10 border border-primary/30 text-red-400 text-sm font-medium">
                </div>
                <!-- Success message -->
                <div id="signupSuccess"
                    class="hidden mb-5 px-4 py-3 rounded-xl bg-green-500/10 border border-green-500/30 text-green-400 text-sm font-medium">
                </div>

                <form id="signupForm" class="space-y-5">
                    <!-- Full Name Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1" for="fullName">Họ và tên</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">person</span>
                            </div>
                            <input id="fullName"
                                class="block w-full pl-11 pr-4 py-3 bg-background-dark/50 border border-slate-700/50 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="Nguyễn Văn A" type="text" required />
                        </div>
                    </div>

                    <!-- Phone Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1" for="phone">Số điện thoại (10
                            số)</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">call</span>
                            </div>
                            <input id="phone"
                                class="block w-full pl-11 pr-4 py-3 bg-background-dark/50 border border-slate-700/50 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="09xxxxxxxx" type="tel" maxlength="10" required />
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Password Field -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-300 ml-1" for="password">Mật khẩu</label>
                            <div class="relative group">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-xl">lock</span>
                                </div>
                                <input id="password"
                                    class="block w-full pl-11 pr-4 py-3 bg-background-dark/50 border border-slate-700/50 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                    placeholder="••••••••" type="password" required />
                            </div>
                        </div>
                        <!-- Confirm Password Field -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-300 ml-1" for="confirmPassword">Xác
                                nhận</label>
                            <div class="relative group">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-xl">shield</span>
                                </div>
                                <input id="confirmPassword"
                                    class="block w-full pl-11 pr-4 py-3 bg-background-dark/50 border border-slate-700/50 rounded-xl text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                    placeholder="••••••••" type="password" required />
                            </div>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="flex items-start gap-2 px-1">
                        <input
                            class="mt-1 w-4 h-4 rounded border-slate-700 bg-background-dark text-primary focus:ring-primary focus:ring-offset-background-dark"
                            id="terms" type="checkbox" required />
                        <label class="text-xs text-slate-400 select-none leading-relaxed" for="terms">
                            Tôi đồng ý với <a href="#" class="text-primary hover:underline">Điều khoản dịch vụ</a> và <a
                                href="#" class="text-primary hover:underline">Chính sách bảo mật</a> của SAFEALL.
                        </label>
                    </div>

                    <!-- Sign Up Button -->
                    <button id="btnSignup"
                        class="w-full flex items-center justify-center gap-2 py-4 px-6 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] mt-4"
                        type="submit">
                        <span>Đăng ký ngay</span>
                        <span class="material-symbols-outlined">person_add</span>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-800 text-center text-sm">
                    <p class="text-slate-400">
                        Bạn đã có tài khoản?
                        <a class="text-primary font-bold hover:underline ml-1 transition-all" href="../login.html">Đăng
                            nhập ngay</a>
                    </p>
                </div>
            </div>

            <!-- Secondary Navigation -->
            <div class="mt-12 flex justify-center gap-6 text-xs text-slate-600 font-medium">
                <a class="hover:text-slate-400 transition-colors" href="#">Trợ giúp</a>
                <a class="hover:text-slate-400 transition-colors" href="#">FAQ</a>
                <a class="hover:text-slate-400 transition-colors" href="#">Liên hệ</a>
            </div>
        </div>
    </div>

    <!-- We link it to a root script for consistency if needed, or keeping it local -->
    <script src="../js/api.js"></script>
    <script src="../js/sign_up.js"></script>
</body>

</html>
